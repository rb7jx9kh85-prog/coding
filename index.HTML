<body>

<h1>Online ChatBot</h1>

<p>Bienvenue sur mon premier chatbot.</p>

<button onclick="ouvrirChatbot()">
Open ChatBot
</button>

<br><br>

<div id="chatbot" hidden>

<h2>ChatBot</h2>

<div id="messages"></div>

<input
id="question"
type="text"
placeholder="Écris un message">

<button onclick="envoyerMessage()">
Envoyer
</button>

<button onclick="fermerChatbot()">
Fermer
</button>

</div>

<script>

// ======================
// VARIABLES
// ======================

let prenom = "Noé";
let nom = "Vouillamoz";
let age = 14;
let ville = "Sion";
let entreprise = "Alpinia Web Craft";


// ======================
// OUVRIR LE CHATBOT
// ======================

function ouvrirChatbot(){

    document.getElementById("chatbot").hidden = false;

}


// ======================
// FERMER LE CHATBOT
// ======================

function fermerChatbot(){

    document.getElementById("chatbot").hidden = true;

}


// ======================
// ENVOYER UN MESSAGE
// ======================

function envoyerMessage(){

    let input = document.getElementById("question");

    let message = input.value.toLowerCase();

    let messages = document.getElementById("messages");

    let reponse = "Je ne comprends pas encore cette question.";



    if(message.includes("bonjour")){

        reponse = "Bonjour !";

    }


    if(message.includes("prénom") || message.includes("prenom")){

        reponse = "Je m'appelle " + prenom + ".";

    }


    if(message.includes("nom")){

        reponse = "Mon nom est " + nom + ".";

    }


    if(message.includes("age") || message.includes("âge")){

        reponse = "J'ai " + age + " ans.";

    }


    if(message.includes("ville")){

        reponse = "J'habite à " + ville + ".";

    }


    if(message.includes("entreprise")){

        reponse = "Je travaille pour " + entreprise + ".";

    }


    if(message.includes("salut")){

        reponse = "Salut 👋";

    }


    messages.innerHTML += "<p><b>Toi :</b> " + input.value + "</p>";

    messages.innerHTML += "<p><b>Bot :</b> " + reponse + "</p>";

    input.value = "";

}

</script>

</body>

</html>
