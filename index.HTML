<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon premier projet</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ff2800;
    font-family:Arial, Rubik Glitch, sans-serif;
}
.card{
    background:#1f2937;
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:orange;
    width:400px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

h1{
    margin-top:0;
}

#nombre{
    font-size:60px;
    margin:25px 0;
    color:#60a5fa;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    background:#3b82f6;
    color:white;
    transition:.25s;
}

button:hover{
    transform:scale(1.08);
}

</style>

</head>
<body>

<div class="card">

<h1>Compteur de clics</h1>

<div id="nombre">0</div>

<button onclick="ajouter()">
Clique ici
</button>

</div>

<script>

let compteur = 0;

function ajouter(){

    compteur++;
alert("Bonjour !") 
let prenom = "Noé";


    document.getElementById("nombre").innerText = compteur;

}

</script>

</body>
</html>
